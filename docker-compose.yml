version: '3.8'

services:
  bot:
    build: .
    container_name: pdf_bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=sqlite+aiosqlite:///database/bot.db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADMIN_IDS=${ADMIN_IDS}
    volumes:
      - ./database:/app/database
      - ./temp:/app/temp
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - bot_network

  redis:
    image: redis:7-alpine
    container_name: pdf_bot_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - bot_network

  nginx:
    image: nginx:alpine
    container_name: pdf_bot_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - bot
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  redis_data:
